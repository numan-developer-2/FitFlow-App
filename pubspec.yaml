name: fitflow
description: "A professional fitness application with advanced features"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  video_player: ^2.8.2
  chewie: ^1.7.5
  fl_chart: ^0.65.0
  # Firebase packages - Temporarily removed to fix compilation issues
  # firebase_core: ^2.32.0
  # firebase_auth: ^4.16.0
  # cloud_firestore: ^4.17.5
  # UI Components
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  # Utils
  intl: ^0.20.2
  logger: ^2.1.0
  equatable: ^2.0.5
  confetti: ^0.8.0
  # Added for video caching
  http: ^1.1.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/Videos/
